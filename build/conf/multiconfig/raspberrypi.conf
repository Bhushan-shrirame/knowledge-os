MACHINE = "raspberrypi3-64"
DISTRO = "MerlinOS"

# Raspberry Pi Hardware Config
# Define the image types (wic is the SD card format)
IMAGE_FSTYPES = "wic.bz2"
ENABLE_UART = "1"
DISABLE_RPI_BOOT_LOGO = "1"
# Helps keep your MerlinOS logo clean
ARM_KEEP_ALIVE = "1"
APPEND:append:raspberrypi4 = " isolcpus=3"
SERIAL_CONSOLES = "115200;ttyAMA0 115200;tty1"

IMAGE_INSTALL:append = " \
    custom-boot \
    packagegroup-custom-core \
    packagegroup-custom-net \
    packagegroup-custom-python \
    packagegroup-custom-tools \
    packagegroup-llm-package \
    ssh-pregen-hostkeys \
    rng-tools \
    rt-tests \
    sysstat \
    iotop \
    procps \
"

SERIAL_CONSOLES_CHECK = ""
hostname:pn-base-files = "knowledge-os"
LICENSE_FLAGS_ACCEPTED += "commercial"
LICENSE_FLAGS_ACCEPTED:append = " synaptics-killswitch"

require conf/distro/include/yocto-uninative.inc

APPEND:append = " fastboot panic=5"
ENABLE_BINARY_LOCALE_GENERATION = "1"
GLIBC_GENERATE_LOCALES = "en_US.UTF-8"
IMAGE_LINGUAS = "en-us"
LOCALE_UTF8_ONLY = "1"

IMAGE_FEATURES += "read-only-rootfs"
DISTRO_FEATURES:append = " read-only-rootfs"
VOLATILE_LOG_DIR = "yes"
PREFERRED_PROVIDER_virtual/kernel = "linux-yocto-rt"


# Only apply isolation if the machine is a Raspberry Pi 4
APPEND:append:raspberrypi4 = " isolcpus=3"

BAZEL_JOBS = "2"
BAZEL_MEM = "8000"
IMAGE_ROOTFS_EXTRA_SPACE = "4194304"
KERNEL_VERSION_SANITY_SKIP = "1"

BB_NUMBER_THREADS = "6"
PARALLEL_MAKE = "-j 6"

INHERIT += "rm_work"