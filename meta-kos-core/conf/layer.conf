# =========================================================================
# MerlinOS Core Layer Configuration (meta-kos-core)
# =========================================================================
#
# This file configures the core Yocto layer for MerlinOS. A "layer" in Yocto
# is a repository containing related sets of instructions (recipes) that tell
# the build system how to build software, configure images, or define
# specific machine behaviors.
#
# This specific layer (meta-kos-core) houses the foundational recipes,
# system configurations, and the distro definition for MerlinOS.
# =========================================================================


# --- Include Paths Setting ---
# We add the directory containing this layer (and its subdirectories like
# 'conf' and 'classes') to BBPATH. This allows the BitBake build engine to
# locate configuration files (like our distro config) and custom classes
# defined within this layer.
BBPATH .= ":${LAYERDIR}"


# --- Recipe Location Definition ---
# This tells BitBake where to find the actual software build instructions
# (.bb files) and recipe modifications (.bbappend files). We use wildcards
# to automatically include any recipe files located within the 'recipes-*'
# subdirectories of this layer.
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"


# --- Layer Identification and Priority ---
# BBFILE_COLLECTIONS: Registers a unique name for this layer within the
# build environment. We register it as "meta-kos-core".
BBFILE_COLLECTIONS += "meta-kos-core"

# BBFILE_PATTERN: BitBake uses this regular expression to identify which
# files belong to this layer. It matches anything under the current layer's
# root directory (${LAYERDIR}).
BBFILE_PATTERN_meta-kos-core = "^${LAYERDIR}/"

# BBFILE_PRIORITY: Sets the priority of this layer. If multiple layers
# provide a recipe with the same name and version, BitBake chooses the one
# from the layer with the highest priority. A priority of "15" is relatively
# high, meaning this core layer's recipes will generally override default
# upstream recipes if they conflict.
BBFILE_PRIORITY_meta-kos-core = "15"


# --- Layer Dependencies and Compatibility ---
# LAYERDEPENDS: Lists the other Yocto layers that this layer relies on to
# function properly. Our core layer depends on the foundational OpenEmbedded
# "core" layer (meta).
LAYERDEPENDS_meta-kos-core = "core"

# LAYERSERIES_COMPAT: Declares which versions (release series) of the Yocto
# Project this layer is compatible with. "scarthgap" refers to the specific
# Yocto release (version 5.0). BitBake will refuse to parse this layer if
# the environment is not based on a compatible series.
LAYERSERIES_COMPAT_meta-kos-core = "scarthgap"