# --- System Management: Systemd ---
# This single line handles most of the heavy lifting in modern Yocto
INIT_MANAGER = "systemd"

# Ensure systemd is active and remove sysvinit to avoid conflicts
DISTRO_FEATURES:append = " systemd pam"
DISTRO_FEATURES:remove = "sysvinit"

# Point runtime providers to systemd
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "systemd"

# Prevent sysvinit scripts from being backfilled into the image
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"

# --- Hardware & Features ---
# Keep it lean: we still don't need GUIs or heavy desktop protocols for a drone
DISTRO_FEATURES:append = " tiny ipv4 ipv6 virtualization"
DISTRO_FEATURES:remove = "x11 wayland vulkan alsa bluetooth nfc 3g pci opengl"

# --- Optimization ---
IMAGE_LINGUAS = "" 
FORCE_RO_REMOVE_ROOTFS = "1"

# We allow python3 now since you need it for AI/MAVLink, but keep it minimal
# Removed "systemd" from BAD_RECOMMENDATIONS
BAD_RECOMMENDATIONS += "python3-modules"

# --- Development & Licensing ---
INHERIT += "uninative"
LICENSE_FLAGS_ACCEPTED += "commercial"