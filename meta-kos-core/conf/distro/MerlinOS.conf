# =========================================================================
# MerlinOS Distribution Configuration
# =========================================================================

# --- Distribution Identity ---
DISTRO = "MerlinOS"
DISTRO_NAME = "MerlinOS"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "horizon"

# --- Branding and Appearance ---
BASEFS_IMAGE_BANNER = "MerlinOS 1.0 \\n \\l"
hostname:pn-base-files = "merlinos"

# --- System Management & Initialization ---
INIT_MANAGER = "systemd"

DISTRO_FEATURES:append = " systemd pam read-only-rootfs"
DISTRO_FEATURES:remove = "sysvinit x11 wayland vulkan alsa bluetooth nfc 3g pci opengl"

VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "systemd"
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"
EXTRA_IMAGE_FEATURES += "debug-tweaks"

# Enable Read-Only Root Filesystem globally for all MerlinOS builds
IMAGE_FEATURES += "read-only-rootfs"

# --- Image Optimizations ---
ENABLE_BINARY_LOCALE_GENERATION = "1"
GLIBC_GENERATE_LOCALES = "en_US.UTF-8"
IMAGE_LINGUAS = "en-us"
LOCALE_UTF8_ONLY = "1"

# Map /var/volatile to RAM (tmpfs)
VOLATILE_LOG_DIR = "yes"

# Kernel
PREFERRED_PROVIDER_virtual/kernel = "linux-yocto-rt"
KERNEL_VERSION_SANITY_SKIP = "1"

# Read-Only Root Filesystem prep
FORCE_RO_REMOVE_ROOTFS = "1"

BAD_RECOMMENDATIONS += "python3-modules"

# File System Padding
# IMAGE_ROOTFS_EXTRA_SPACE = "4194304"

# --- Performance & Build Tuning ---
BB_NUMBER_THREADS = "6"
PARALLEL_MAKE = "-j 6"
BAZEL_JOBS = "2"
BAZEL_MEM = "8000"

# --- Development & Licensing ---
INHERIT += "uninative rm_work"
require conf/distro/include/yocto-uninative.inc

LICENSE_FLAGS_ACCEPTED += "commercial"
LICENSE_FLAGS_ACCEPTED:append = " synaptics-killswitch"

# --- Initramfs Configuration ---
INITRAMFS_IMAGE = "core-image-minimal-initramfs"
INITRAMFS_IMAGE_BUNDLE = "1"