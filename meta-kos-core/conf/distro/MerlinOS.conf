# =========================================================================
# MerlinOS Distribution Configuration
# =========================================================================
#
# This file defines the core configuration for MerlinOS, a custom Linux
# distribution built using the Yocto Project. It acts as the blueprint
# defining the target operating system's identity, initialization manager
# (init system), supported software features, and optimizations.
# 
# The goal of this distribution configuration is to provide a lean,
# optimized environment tailored for its target use case, stripping out
# unnecessary desktop features and relying on systemd for robust system
# management.
# =========================================================================

# --- Distribution Identity ---
# These variables establish the basic identity of the OS.
# DISTRO: The internal short name of the distribution.
# DISTRO_NAME: The human-readable name of the distribution.
# DISTRO_VERSION: The current version number.
# DISTRO_CODENAME: A symbolic name for this specific release.
DISTRO = "MerlinOS"
DISTRO_NAME = "MerlinOS"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "horizon"

# --- Branding and Appearance ---
# BASEFS_IMAGE_BANNER: Defines the login banner displayed on the console
# before a user logs in. The '\n' and '\l' represent a newline and the
# tty line respectively.
BASEFS_IMAGE_BANNER = "MerlinOS 1.0 \\n \\l"

# hostname:pn-base-files: Overrides the default hostname provided by the
# 'base-files' package. The system hostname will be set to "merlinos".
hostname:pn-base-files = "merlinos"


# --- System Management & Initialization ---
# Here we define how the OS boots and manages running services.
# Rather than using older sysvinit, we configure the system to use systemd,
# which is the modern standard for Linux service management and provides
# powerful tools for managing daemon processes.

# State that we are using systemd as the primary init manager.
INIT_MANAGER = "systemd"

# Ensure systemd and Pluggable Authentication Modules (PAM) are included
# in the final image, while explicitly removing sysvinit to prevent conflicts.
DISTRO_FEATURES:append = " systemd pam"
DISTRO_FEATURES:remove = "sysvinit"

# Tell the build system which packages should satisfy virtual runtime dependencies.
# This ensures that whenever a package asks for an init manager or login manager,
# systemd is provided instead of falling back to default alternatives.
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "systemd"

# Prevent older sysvinit scripts from implicitly being pulled into the image
# as a fallback measure.
DISTRO_FEATURES_BACKFILL_CONSIDERED:append = " sysvinit"


# --- Hardware & Software Features ---
# DISTRO_FEATURES dictate which capabilities are compiled into packages.
# We append features we want (like ipv4, ipv6, virtualization) and remove
# features we don't need (like desktop windowing systems and audio).
# 
# We explicitly remove GUI frameworks (x11, wayland), graphics APIs
# (vulkan, opengl), audio (alsa), and hardware interfaces we don't need
# (bluetooth, nfc, 3g) to keep the image footprint as small as possible.
DISTRO_FEATURES:append = " tiny ipv4 ipv6 virtualization"
DISTRO_FEATURES:remove = "x11 wayland vulkan alsa bluetooth nfc 3g pci opengl"


# --- Image Optimizations ---
# Language Support: Clear the IMAGE_LINGUAS variable to avoid installing
# localization and translation packages, saving disk space.
IMAGE_LINGUAS = "" 

# Read-Only Root Filesystem prep: This flag aggressively removes rootfs
# bloat during image construction if the final image is meant to be read-only.
FORCE_RO_REMOVE_ROOTFS = "1"

# BAD_RECOMMENDATIONS prevents the package manager from installing packages
# that are normally recommended by other packages.
# Since we need Python 3 for AI or MAVLink communications, we allow python3,
# but we explicitly block 'python3-modules' which would otherwise pull in
# the massive standard library, most of which is unnecessary for embedded use.
BAD_RECOMMENDATIONS += "python3-modules"


# --- Development & Licensing ---
# uninative: Enables the use of pre-compiled native binaries provided by
# Yocto, significantly speeding up the build process by bypassing the need
# to compile certain host tools from scratch.
INHERIT += "uninative"

# Accept commercial licenses to allow building packages that might have
# proprietary or non-free license restrictions (common with certain codecs
# or hardware drivers).
LICENSE_FLAGS_ACCEPTED += "commercial"