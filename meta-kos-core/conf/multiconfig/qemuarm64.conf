MACHINE = "qemuarm64"
DISTRO = "MerlinOS"

TMPDIR = "${TOPDIR}/tmp-${BB_CURRENT_MC}"

IMAGE_FSTYPES += " wic"
WKS_FILE = "merlin-drone.wks"
IMAGE_BOOT_FILES = "Image"

# IMAGE_INSTALL:append = " \
#     custom-boot \
#     packagegroup-custom-core \
#     packagegroup-custom-net \
#     packagegroup-custom-python \
#     packagegroup-custom-tools \
#     packagegroup-llm-package \
# "
IMAGE_INSTALL:append = " \
    packagegroup-custom-core \
    packagegroup-custom-net \
    packagegroup-custom-python \
    packagegroup-custom-tools \
    packagegroup-llm-package \
"

# Prevents getty from clearing the screen, keeping your ASCII art visible
SERIAL_CONSOLES_CHECK = ""

# Disable the 5-second wait at the bootloader (if applicable)
APPEND:append = " fastboot"

# Reboot 5 seconds after a kernel panic
APPEND:append = " panic=5" 

# ---------------------------------------------------------
# MERLINOS VIRTUAL HARDWARE UPGRADE
# ---------------------------------------------------------
# Allocate 8GB of RAM
QB_MEM = "-m 8192"

# Allocate 6 CPU Cores
QB_SMP = "-smp 6"

# Fix the serial console for nographic mode
SERIAL_CONSOLES = "115200;ttyAMA0"

# Kernel command line tweaks for quiet boot and proper memory
QB_KERNEL_CMDLINE_APPEND += " console=ttyAMA0,115200 --noclear quiet splash loglevel=0 systemd.show_status=false rd.udev.log_level=0 vt.global_cursor_default=0 mem=4G"


# Limit build to 6 CPU cores
BB_NUMBER_THREADS ?= "6"
PARALLEL_MAKE ?= "-j 6"