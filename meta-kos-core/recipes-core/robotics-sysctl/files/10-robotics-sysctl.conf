# =========================================================
# MerlinOS Robotics Kernel Hardening
# =========================================================

# 1. Deterministic Memory
# Completely disable swappiness. If the drone runs out of RAM, 
# it's better to OOM-kill a process than to experience 
# uncontrolled disk I/O latency while swapping.
vm.swappiness=0

# 2. Real-Time Scheduler Tuning
# Disable the RT throttling mechanism. This allows Real-Time 
# processes (like flight controllers) to consume 100% of the CPU 
# if they need to, without the kernel arbitrarily cutting them off.
kernel.sched_rt_runtime_us=-1

# 3. Network Tuning (Telemetry Links)
# Use BBR for congestion control. It handles packet loss 
# significantly better than CUBIC, which is critical for 
# long-range drone telemetry over radio/LTE gaps.
net.core.default_qdisc=fq_codel
net.ipv4.tcp_congestion_control=bbr
net.ipv4.tcp_fastopen=3

# 4. Kernel Panic Recovery
# Automatically reboot exactly 3 seconds after a kernel panic
# preventing the drone from hanging dead in the air
kernel.panic=3
