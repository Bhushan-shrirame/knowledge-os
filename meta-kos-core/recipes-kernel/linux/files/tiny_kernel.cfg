# Tiny Kernel Optimization Fragment
# Manually created to bypass the interactive menuconfig tool.

# --- Drop Sound Subsystem ---
# Drones generally do not have sound cards or speakers.
CONFIG_SOUND=n
CONFIG_SND=n

# --- Drop Bluetooth ---
# If your drone uses direct radio/MAVLink or Wifi, BT is unneeded.
CONFIG_BT=n

# --- Drop Obscure Networking ---
# ISDN, Amateur Radio, and NFC are legacy or unneeded for basic drone IP networking.
CONFIG_ISDN=n
CONFIG_HAMRADIO=n
CONFIG_NFC=n

# --- Drop Display & Graphics (Headless) ---
# Drones stream video via network (V4L2), they do not drive physical monitors.
CONFIG_DRM=n
CONFIG_FB=n
CONFIG_VGA_CONSOLE=n

# --- Drop Legacy Hardware ---
# PCMCIA cards are obsolete.
CONFIG_PCCARD=n
CONFIG_PCMCIA=n
